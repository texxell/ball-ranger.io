<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BallRanger.io - 3D Brawler</title>
    <link rel="stylesheet" href="style.css">
    <!-- Include Three.js via global CDN first to guarantee dependency resolution -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <!-- The dedicated viewport container for the 3D canvas -->
    <div id="three-canvas-container"></div>

    <!-- Persistent Global HUD for tracking currencies -->
    <div class="hud-header">
        <div class="hud-coin" id="hud-coin-amount">0G</div>
    </div>

    <!-- Dynamic Central Notification Banner -->
    <div id="center-alert">SYSTEM READY</div>

    <!-- Primary Menu Overlay Layer (Lobby Screen) -->
    <div class="overlay-layer" id="lobby-layer">
        <div class="lobby-dashboard">
            <h1 class="lobby-title">BALLRANGER.IO</h1>
            <p class="lobby-subtitle">Select multiplier options below to buffer your starting mass:</p>
            
            <div class="multiplier-container">
                <button class="btn-ui active" id="btn-ad-x1">NORMAL VOL</button>
                <button class="btn-ui" id="btn-ad-x2">AD VOL x2</button>
                <button class="btn-ui" id="btn-ad-x5">AD VOL x5</button>
            </div>

            <div class="shop-box">
                <h3 class="shop-title">WEAPON & UTILITY SHOP</h3>
                <button class="btn-ui" id="btn-buy-shield">UNLOCK SHIELD (500G)</button>
            </div>

            <button class="btn-ui btn-cheat" id="btn-cheat-gold">DEBUG: ADD TEST GOLD (+1000)</button>
        </div>
        <button class="btn-ui btn-main-start" id="btn-start-game">START GAME</button>
    </div>

    <!-- In-Game Multi-Touch HUD Layer Layout -->
    <div id="ingame-ui-container">
        <div class="joystick-zone" id="joy-zone">
            <div class="joystick-handle" id="joy-handle"></div>
        </div>
        <div class="action-zone">
            <button class="btn-action" id="btn-dash">DASH</button>
            <button class="btn-action" id="btn-weapon">SHIELD</button>
        </div>
    </div>

    <!-- Linear Script Ordering to Prevent Structural Deadlocks -->
    <script src="GameUI.js"></script>
    <script src="MainScene.js"></script>
    <script src="PhysicsEngine.js"></script>
    <script src="GameShop.js"></script>
    <script src="App.js"></script>
</body>
</html>
